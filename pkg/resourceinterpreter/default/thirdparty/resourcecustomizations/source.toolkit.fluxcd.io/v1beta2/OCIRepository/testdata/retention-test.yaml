#test cases for retention of OCIRepo
# case1. OCIRepository: retain suspend=true
# case2. OCIRepository: retain suspend=false
# case3. OCIRepository: retain without suspend
# case4. OCIRepository: desired without suspend, observed has suspend
# case5. OCIRepository: retain should not affect other spec fields

name: "OCIRepository retain suspend=true"
description: "Retain should copy suspend=true from observed object"
desiredObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: false
observedObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: true
operation: Retain
output:
  retained:
    apiVersion: source.toolkit.fluxcd.io/v1beta2
    kind: OCIRepository
    metadata:
      name: sample
      namespace: test-ocirepository
    spec:
      suspend: true
---
name: "OCIRepository retain suspend=false"
description: "Retain should copy suspend=false from observed object"
desiredObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: true
observedObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: false
operation: Retain
output:
  retained:
    apiVersion: source.toolkit.fluxcd.io/v1beta2
    kind: OCIRepository
    metadata:
      name: sample
      namespace: test-ocirepository
    spec:
      suspend: false
---
name: "OCIRepository retain without suspend"
description: "Retain should not modify desired spec when observed suspend is missing"
desiredObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: true
observedObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec: {}
operation: Retain
output:
  retained:
    apiVersion: source.toolkit.fluxcd.io/v1beta2
    kind: OCIRepository
    metadata:
      name: sample
      namespace: test-ocirepository
    spec:
      suspend: true
---
name: "OCIRepository retain adds suspend to desired"
description: "Retain should add suspend field if missing in desired"
desiredObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec: {}
observedObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: true
operation: Retain
output:
  retained:
    apiVersion: source.toolkit.fluxcd.io/v1beta2
    kind: OCIRepository
    metadata:
      name: sample
      namespace: test-ocirepository
    spec:
      suspend: true
---
name: "OCIRepository retain does not modify other fields"
description: "Retain must only affect suspend field"
desiredObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    interval: 10m
    suspend: false
observedObj:
  apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: OCIRepository
  metadata:
    name: sample
    namespace: test-ocirepository
  spec:
    suspend: true
operation: Retain
output:
  retained:
    apiVersion: source.toolkit.fluxcd.io/v1beta2
    kind: OCIRepository
    metadata:
      name: sample
      namespace: test-ocirepository
    spec:
      interval: 10m
      suspend: true
